<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홍보은영어학원 · 원생 관리 시스템</title>
<style>
  :root{
    --cream:#F7EFDE; --cream-2:#FBF6EC; --navy:#1E2B47; --navy-2:#2C3B5C;
    --coral:#D9543C; --coral-soft:#F3D8D1; --gold:#BC8A30; --gold-soft:#EDE0C4;
    --ink:#27313F; --muted:#7A8190; --line:#E4DCC9; --white:#fff;
    --ok:#3F7A52; --ok-soft:#DDEBE0; --warn:#B6852B; --warn-soft:#F3E6C8;
    --radius:14px; --shadow:0 1px 2px rgba(30,43,71,.06),0 8px 24px rgba(30,43,71,.07);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,system-ui,sans-serif;
    background:var(--cream); color:var(--ink); font-size:15px; line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{margin:0;color:var(--navy);font-weight:700;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}
  a{color:inherit}

  /* layout */
  .app{display:flex;min-height:100vh}
  .sidebar{
    width:248px;flex-shrink:0;background:var(--navy);color:#D7DCE8;
    padding:24px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{padding:0 8px 20px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:16px}
  .brand .logo{display:flex;align-items:center;gap:10px}
  .brand .mark{
    width:34px;height:34px;border-radius:9px;background:var(--coral);
    display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px;flex-shrink:0;
  }
  .brand .name{color:#fff;font-size:16px;font-weight:700;line-height:1.2}
  .brand .sub{font-size:11px;color:#9AA5BD;margin-top:2px}
  .nav-group-label{font-size:10.5px;letter-spacing:.12em;color:#8492AF;text-transform:uppercase;padding:14px 10px 6px;font-weight:700}
  .nav-item{
    display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;
    color:#C3CADA;font-size:14px;font-weight:500;width:100%;text-align:left;transition:.15s;margin-bottom:2px;
  }
  .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav-item.active{background:var(--coral);color:#fff;font-weight:600}
  .nav-item .ic{width:18px;text-align:center;font-size:15px;opacity:.9}
  .nav-foot{margin-top:18px;padding:12px 10px 0;border-top:1px solid rgba(255,255,255,.1);font-size:11px;color:#8492AF}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{
    background:var(--cream-2);border-bottom:1px solid var(--line);
    padding:14px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;
    position:sticky;top:0;z-index:20;
  }
  .topbar .crumb{font-size:13px;color:var(--muted)}
  .topbar .crumb b{color:var(--navy)}
  .topbar .term{font-size:12px;color:var(--muted)}
  .content{padding:28px 32px 60px;max-width:1180px;width:100%}

  .page-head{margin-bottom:22px}
  .page-head h1{font-size:23px}
  .page-head p{color:var(--muted);font-size:13.5px;margin:5px 0 0}

  /* cards */
  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .card.pad{padding:22px}
  .card-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:4px}
  .card-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}

  .grid{display:grid;gap:18px}
  .g-stats{grid-template-columns:repeat(4,1fr)}
  .g-2{grid-template-columns:1fr 1fr}
  .g-37{grid-template-columns:340px 1fr}
  .g-55{grid-template-columns:1fr 1fr}

  .stat{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .stat .lbl{font-size:12.5px;color:var(--muted);font-weight:500}
  .stat .num{font-size:30px;font-weight:800;color:var(--navy);line-height:1.1;margin-top:6px}
  .stat .num small{font-size:14px;font-weight:600;color:var(--muted);margin-left:3px}
  .stat .tag{position:absolute;top:16px;right:16px;font-size:18px;opacity:.5}
  .stat.accent{border-top:3px solid var(--coral)}
  .stat.gold{border-top:3px solid var(--gold)}

  /* form */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--navy);margin-bottom:5px}
  .field label .req{color:var(--coral)}
  .control{
    width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:9px;background:var(--cream-2);
    color:var(--ink);outline:none;transition:.15s;
  }
  .control:focus{border-color:var(--coral);background:#fff;box-shadow:0 0 0 3px var(--coral-soft)}
  textarea.control{resize:vertical;min-height:64px;line-height:1.5}
  .row2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .row2.two{grid-template-columns:1fr 1fr}

  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:9px;font-size:14px;font-weight:600;transition:.15s}
  .btn-primary{background:var(--coral);color:#fff}
  .btn-primary:hover{background:#c4492f}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-navy:hover{background:var(--navy-2)}
  .btn-gold{background:var(--gold);color:#fff}
  .btn-gold:hover{background:#a8761f}
  .btn-ghost{background:var(--cream-2);color:var(--navy);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--gold-soft)}
  .btn-block{width:100%}
  .btn-sm{padding:6px 12px;font-size:12.5px;border-radius:7px}
  .btn-danger{background:var(--coral-soft);color:var(--coral)}
  .btn-danger:hover{background:#ecc4bb}

  /* student list */
  .tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .tab{padding:6px 13px;border-radius:20px;font-size:12.5px;font-weight:600;background:var(--cream-2);color:var(--muted);border:1px solid var(--line)}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .stu{padding:13px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;cursor:pointer;transition:.15s;background:var(--white)}
  .stu:hover{border-color:var(--coral);background:var(--cream-2)}
  .stu.sel{border-color:var(--coral);background:var(--coral-soft)}
  .stu .top{display:flex;align-items:center;justify-content:space-between}
  .stu .nm{font-weight:700;color:var(--navy);font-size:14.5px}
  .stu .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .badge{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
  .badge.active{background:var(--ok-soft);color:var(--ok)}
  .badge.consult{background:var(--coral-soft);color:var(--coral)}
  .badge.rest{background:var(--warn-soft);color:var(--warn)}

  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;font-size:11.5px;letter-spacing:.04em;color:var(--muted);font-weight:700;text-transform:uppercase;padding:9px 10px;border-bottom:2px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid var(--line);color:var(--ink);vertical-align:top}
  tr:last-child td{border-bottom:none}
  .empty{text-align:center;color:var(--muted);padding:34px 0;font-size:13px}

  /* sliders / radar */
  .slider-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
  .slider-row .nm{width:128px;flex-shrink:0;font-size:13px;font-weight:600;color:var(--navy)}
  .slider-row .nm small{display:block;font-weight:400;color:var(--muted);font-size:11px}
  .slider-row input[type=range]{flex:1;accent-color:var(--coral);height:5px}
  .slider-row .val{width:46px;text-align:right;font-weight:800;color:var(--coral);font-size:16px}
  .radar-wrap{display:grid;place-items:center;padding:10px}
  .radar-cap{text-align:center;margin-bottom:6px}

  /* mark grid */
  .marks{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .mark{width:38px;height:42px;border:1px solid var(--line);border-radius:8px;background:var(--cream-2);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--navy);cursor:pointer;transition:.12s}
  .mark small{font-size:9px;color:var(--muted);font-weight:500}
  .mark.wrong{background:var(--coral);color:#fff;border-color:var(--coral)}
  .mark.wrong small{color:#ffd9d0}

  /* commentary box */
  .commentary{background:var(--cream-2);border:1px dashed var(--gold);border-radius:11px;padding:15px;font-size:13px;line-height:1.65;white-space:pre-wrap;color:var(--ink);min-height:120px}
  .commentary.gen{border-style:solid;border-color:var(--line)}

  /* toast */
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);opacity:0;transition:.3s;z-index:100;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(30,43,71,.55);display:none;align-items:center;justify-content:center;z-index:90;padding:24px}
  .modal-bg.open{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal-head{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
  .modal-body{padding:22px 24px}
  .x{font-size:22px;color:var(--muted);width:34px;height:34px;border-radius:50%;display:grid;place-items:center}
  .x:hover{background:var(--cream-2);color:var(--navy)}

  /* misc */
  .hint{font-size:12px;color:var(--muted);background:var(--gold-soft);border-radius:9px;padding:10px 13px;line-height:1.55}
  .hint b{color:var(--navy)}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--gold-soft);color:var(--gold)}
  .divider{height:1px;background:var(--line);margin:18px 0}
  .kpi-foot{font-size:11.5px;color:var(--muted);margin-top:4px}
  .link{color:var(--coral);font-weight:600;cursor:pointer}
  .link:hover{text-decoration:underline}
  .activity{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .activity:last-child{border-bottom:none}
  .activity .who{font-weight:700;color:var(--navy)}
  .activity .when{color:var(--muted);font-size:11.5px;white-space:nowrap}

  /* print */
  @media print{
    .sidebar,.topbar,.no-print{display:none!important}
    .main{display:block}
    .content{padding:0;max-width:100%}
    body{background:#fff}
    .print-area{display:block!important}
  }
  .print-area{display:none}

  /* responsive */
  @media(max-width:980px){
    .g-stats{grid-template-columns:1fr 1fr}
    .g-2,.g-37,.g-55{grid-template-columns:1fr}
    .row2{grid-template-columns:1fr}
  }
  @media(max-width:720px){
    .sidebar{position:fixed;left:-260px;z-index:60;transition:.25s;box-shadow:6px 0 30px rgba(0,0,0,.3)}
    .sidebar.show{left:0}
    .content{padding:18px 16px 50px}
    .topbar{padding:12px 16px}
    .g-stats{grid-template-columns:1fr 1fr}
    .menu-btn{display:grid!important}
    .scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55}
    .scrim.show{display:block}
  }
  .menu-btn{display:none;width:38px;height:38px;border-radius:9px;background:var(--cream-2);border:1px solid var(--line);place-items:center;font-size:18px;color:var(--navy)}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">
        <div class="mark">홍</div>
        <div>
          <div class="name">홍보은영어학원</div>
          <div class="sub">구문정독 · 원생 관리 시스템</div>
        </div>
      </div>
    </div>
    <div class="nav-group-label">관리</div>
    <button class="nav-item active" data-page="dashboard"><span class="ic">▦</span> 대시보드</button>
    <button class="nav-item" data-page="students"><span class="ic">👥</span> 학생 등록 및 관리</button>
    <button class="nav-item" data-page="grades"><span class="ic">📈</span> 성적 처리 및 추적</button>
    <button class="nav-item" data-page="leveltest"><span class="ic">🎯</span> 레벨 테스트 및 상담지</button>
    <div class="nav-group-label">운영 관리</div>
    <button class="nav-item" data-page="attendance"><span class="ic">📍</span> 출결현황판</button>
    <button class="nav-item" data-page="report"><span class="ic">📋</span> 월말평가서</button>
    <button class="nav-item" data-page="billing"><span class="ic">💳</span> 수강료 청구·수납</button>
    <button class="nav-item" data-page="retest"><span class="ic">🔁</span> 단어재시 추적</button>
    <button class="nav-item" data-page="pending"><span class="ic">⏳</span> 미완료 과제 적체</button>
    <div class="nav-group-label">자료실 & 부속</div>
    <button class="nav-item" data-page="kakao"><span class="ic">💬</span> 학부모 알림톡 작성</button>
    <button class="nav-item" data-page="exams"><span class="ic">📄</span> 평가 시험지 인쇄</button>
    <button class="nav-item" data-page="settings"><span class="ic">⚙️</span> 시스템 및 LLM 설정</button>
    <div class="nav-foot">데이터는 이 브라우저(LocalStorage)에 저장돼요. 설정에서 백업/복원할 수 있어요.</div>
  </aside>
  <div class="scrim" id="scrim"></div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div class="crumb">원생 관리 / <b id="crumb">대시보드</b></div>
      </div>
      <div class="term" id="term"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="print-area" id="printArea"></div>

<script>
/* ============ STORE ============ */
const KEY='hbe_edutrack_v1';
const REGIONS=['재원','상담중','휴원','퇴원'];
const AREAS=[
  {k:'vocab', nm:'어휘력', en:'Vocabulary'},
  {k:'grammar', nm:'문법·어법', en:'Grammar'},
  {k:'syntax', nm:'구문분석', en:'Syntax'},
  {k:'reading', nm:'논리독해', en:'Reading'}
];
const LEVELS=['초등 영어 레벨테스트 (Elementary)','중등 기초 (Pre-Inter)','중등 심화 (Intermediate)','중등 구문정독 (Syntax)'];

const seed=()=>{
  const s1=uid(),s2=uid(),s3=uid(),s4=uid();
  return{
  students:[
    {id:s1,name:'홍길동',school:'양지초',grade:'초6',phone:'010-1234-5678',pphone:'010-9876-5432',status:'상담중',fee:0,memo:'신규 레벨테스트 18점 → 상담 진행',created:'2026-06-13'},
    {id:s2,name:'나초딩',school:'주엽초',grade:'초5',phone:'010-2222-3333',pphone:'010-4444-5555',status:'재원',fee:280000,memo:'레벨테스트 79점, 구문정독 기초반',created:'2026-06-12'},
    {id:s3,name:'김중급',school:'정발중',grade:'중1',phone:'010-3333-1111',pphone:'010-7777-8888',status:'재원',fee:320000,memo:'레벨테스트 완료, 어법 보강 필요',created:'2026-06-10'},
    {id:s4,name:'서중등',school:'오마중',grade:'중3',phone:'010-5555-6666',pphone:'010-1212-3434',status:'재원',fee:350000,memo:'레벨테스트 19점 → 기초부터',created:'2026-06-12'}
  ],
  grades:[],
  consults:[],
  // 단어재시 누적 (스터디플래너 단어테스트_결과/재시 기반) — 위험 신호 추적
  retests:[
    {id:uid(),sid:s3,name:'김중급',book:'능률보카 어원편 U12',result:'미통과',count:2,status:'다음시간 재시',date:'2026-06-11'},
    {id:uid(),sid:s3,name:'김중급',book:'능률보카 어원편 U13',result:'미통과',count:1,status:'구두로 재시',date:'2026-06-12'},
    {id:uid(),sid:s4,name:'서중등',book:'리딩튜터 Ch3',result:'통과',count:0,status:'재시 완료',date:'2026-06-12',score:'18/20'}
  ],
  // 과제 적체 (과제완료DB 미완료과제 기반) — 미완료 누적 추적
  pending:[
    {id:uid(),sid:s3,name:'김중급',type:'집과제',book:'시제ST1',items:['컴투맨 구문정독','워크북'],date:'2026-06-12'},
    {id:uid(),sid:s3,name:'김중급',type:'집과제',book:'시제ST1',items:['워크북'],date:'2026-06-10'},
    {id:uid(),sid:s2,name:'나초딩',type:'학원과제',book:'문법ST1',items:['영상강의+필기'],date:'2026-06-12'}
  ],
  // 월말평가서 (Apps Script 집계 결과 + AI 코멘트 수신/보관)
  reports:[],
  // 수강료 청구·수납 (결제선생 연동 대비 구조)
  invoices:[],
  settings:{apiKey:'',model:'claude-sonnet-4-6',academy:'홍보은영어학원',gasUrl:'',
    // 결제선생 연동 (1단계는 표시용 / 2단계 API 연동 시 사용)
    payssam:{shopName:'',accountUrl:'',apiConnected:false}
  }
}};
function uid(){return Math.random().toString(36).slice(2,9)}
let DB=load();
function load(){try{const r=localStorage.getItem(KEY);return r?JSON.parse(r):seed()}catch(e){return seed()}}
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function today(){return new Date().toISOString().slice(0,10)}

/* ============ UI HELPERS ============ */
const $=s=>document.querySelector(s);
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function badge(s){const m={'재원':'active','상담중':'consult','휴원':'rest','퇴원':'rest'};return `<span class="badge ${m[s]||'rest'}">${s}</span>`}
function openModal(html){$('#modal').innerHTML=html;$('#modalBg').classList.add('open')}
function closeModal(){$('#modalBg').classList.remove('open')}
$('#modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal()});

/* mobile menu */
$('#menuBtn').onclick=()=>{$('#sidebar').classList.toggle('show');$('#scrim').classList.toggle('show')};

// 단어재시 위험: 학생별 미통과 누적
function aggRetestRisk(){
  const m={};DB.retests.forEach(r=>{if(r.result==='미통과'){m[r.sid]=m[r.sid]||{sid:r.sid,name:r.name,total:0};m[r.sid].total+=(r.count||1)}});
  return Object.values(m).sort((a,b)=>b.total-a.total);
}
// 과제 적체 위험: 학생별 미완료 건수
function aggPendingRisk(){
  const m={};DB.pending.forEach(p=>{m[p.sid]=m[p.sid]||{sid:p.sid,name:p.name,count:0};m[p.sid].count+=(p.items?.length||1)});
  return Object.values(m).sort((a,b)=>b.count-a.count);
}

function drawTrend(sid){
  const box=$('#trend');if(!sid){box.innerHTML='<div class="empty">학생을 선택하면 추이가 표시됩니다</div>';return}
  const rows=DB.grades.filter(g=>g.sid===sid).sort((a,b)=>a.date.localeCompare(b.date));
  if(!rows.length){box.innerHTML='<div class="empty">이 학생의 기록된 성적 데이터가 없습니다</div>';return}
  box.innerHTML=lineChart(rows.map(r=>({x:r.date.slice(5),y:r.score})));
}
function lineChart(pts){
  const W=620,H=200,pad=34;const max=100,min=0;
  const xs=(i)=>pad+(pts.length<2?0:i*(W-pad*2)/(pts.length-1));
  const ys=(v)=>H-pad-((v-min)/(max-min))*(H-pad*2);
  const path=pts.map((p,i)=>`${i?'L':'M'}${xs(i)},${ys(p.y)}`).join(' ');
  const dots=pts.map((p,i)=>`<circle cx="${xs(i)}" cy="${ys(p.y)}" r="4" fill="#D9543C"/><text x="${xs(i)}" y="${ys(p.y)-10}" font-size="11" fill="#1E2B47" text-anchor="middle" font-weight="700">${p.y}</text><text x="${xs(i)}" y="${H-12}" font-size="10" fill="#7A8190" text-anchor="middle">${p.x}</text>`).join('');
  const grid=[0,25,50,75,100].map(v=>`<line x1="${pad}" y1="${ys(v)}" x2="${W-pad}" y2="${ys(v)}" stroke="#E4DCC9"/><text x="${pad-6}" y="${ys(v)+3}" font-size="9" fill="#7A8190" text-anchor="end">${v}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px"><line x1="${pad}" y1="${ys(60)}" x2="${W-pad}" y2="${ys(60)}" stroke="#D9543C" stroke-dasharray="4" opacity="0.5"/>${grid}<path d="${path}" fill="none" stroke="#1E2B47" stroke-width="2.5"/>${dots}</svg>`;
}

function drawRadar(){
  const S=260,c=S/2,R=92;const n=AREAS.length;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return[c+r*Math.cos(a),c+r*Math.sin(a)]};
  let rings='';[0.25,0.5,0.75,1].forEach(f=>{rings+=`<polygon points="${AREAS.map((_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="#E4DCC9"/>`});
  let axes='',labels='';AREAS.forEach((a,i)=>{const[x,y]=pt(i,R);axes+=`<line x1="${c}" y1="${c}" x2="${x}" y2="${y}" stroke="#E4DCC9"/>`;const[lx,ly]=pt(i,R+24);labels+=`<text x="${lx}" y="${ly}" font-size="11" font-weight="700" fill="#1E2B47" text-anchor="middle">${a.nm}</text><text x="${lx}" y="${ly+13}" font-size="10" fill="#D9543C" text-anchor="middle" font-weight="700">${scores[a.k]}</text>`});
  const poly=AREAS.map((a,i)=>pt(i,R*scores[a.k]/100).join(',')).join(' ');
  $('#radar').innerHTML=`<svg viewBox="0 0 ${S} ${S}" style="width:100%;max-width:300px">${rings}${axes}<polygon points="${poly}" fill="rgba(217,84,60,.22)" stroke="#D9543C" stroke-width="2.5"/>${AREAS.map((a,i)=>{const[x,y]=pt(i,R*scores[a.k]/100);return`<circle cx="${x}" cy="${y}" r="4" fill="#D9543C"/>`}).join('')}${labels}</svg>`;
}
const MARK_MAP=['vocab','vocab','vocab','vocab','vocab','grammar','grammar','grammar','grammar','grammar','syntax','syntax','syntax','syntax','syntax','reading','reading','reading','reading','reading'];
function drawMarks(){

  document.querySelectorAll('#marks .mark').forEach(m=>m.onclick=()=>{const n=m.dataset.n;wrongs[n]=!wrongs[n];drawMarks()});

function buildRuleCommentary(){
  const stu=DB.students.find(s=>s.id===$('#lv_stu').value);
  const lv=$('#lv_level').value;
  const order=[...AREAS].sort((a,b)=>scores[a.k]-scores[b.k]);
  const weak=order[0],weak2=order[1],strong=order[order.length-1];
  const wrongList=Object.keys(wrongs).filter(k=>wrongs[k]).map(Number).sort((a,b)=>a-b);
  const tone=v=>v>=85?'매우 우수':v>=70?'안정적':v>=55?'보통':v>=40?'보강 필요':'집중 보강 시급';
  const lines=AREAS.map(a=>`· ${a.nm}(${a.en}): ${scores[a.k]}점 — ${tone(scores[a.k])}`);
  const avg=Math.round(AREAS.reduce((s,a)=>s+scores[a.k],0)/AREAS.length);
  return `[${esc(stu?.name||'학생')} · ${lv}] 레벨테스트 진단 (평균 ${avg}점)

■ 영역별 진단
${lines.join('\n')}

■ 종합 소견
강점은 ${strong.nm}(${scores[strong.k]}점)이며, 가장 보강이 필요한 영역은 ${weak.nm}(${scores[weak.k]}점)와 ${weak2.nm}(${scores[weak2.k]}점)입니다. 본원의 구문정독(構文精讀) 방식은 문장 구조를 끊어 읽으며 ${weak.nm}을(를) 체계적으로 끌어올리는 데 강점이 있습니다.

■ 오답 문항
${wrongList.length?`틀린 문항: ${wrongList.join(', ')}번 — 해당 유형 반복 훈련 권장`:'표시된 오답 없음'}

■ 권장 학습 방향
${scores.syntax<60?'구문 분석 기초부터 단계적으로 쌓아 독해 속도와 정확도를 함께 개선하는 것을 권합니다.':'구문 독해 정확도가 안정적이므로, 심화 지문 적용과 어휘 확장을 병행하면 좋겠습니다.'} 주 단위 단어시험과 구문 끊어읽기 점검을 통해 꾸준히 관리하겠습니다.`;
}
async function genCommentary(){
  const comm=$('#comm');comm.classList.add('gen');

  comm.textContent='AI가 상담 코멘트를 작성 중입니다...';
  const stu=DB.students.find(s=>s.id===$('#lv_stu').value);
  const wrongList=Object.keys(wrongs).filter(k=>wrongs[k]);
  const prompt=`너는 '홍보은영어학원'(구문정독 전문 영어학원) 원장이다. 아래 레벨테스트 결과로 학부모 대면 상담지에 들어갈 따뜻하면서 전문적인 상담 코멘트를 한국어로 작성하라. 본원의 핵심 방법론인 '구문정독(문장 구조를 끊어 읽는 정독)'을 자연스럽게 녹여라.
학생: ${stu?.name} (${stu?.grade})
레벨테스트: ${$('#lv_level').value}
점수 - 어휘력:${scores.vocab}, 문법어법:${scores.grammar}, 구문분석:${scores.syntax}, 논리독해:${scores.reading} (각 100점 만점)
틀린 문항: ${wrongList.join(', ')||'없음'}
형식: 영역별 진단 → 종합 소견 → 권장 학습 방향. 6~9문장.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:DB.settings.model||'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});

    lvCommentary=data.content.filter(c=>c.type==='text').map(c=>c.text).join('\n');
    comm.textContent=lvCommentary;toast('AI 상담 코멘트를 생성했어요');
  }catch(e){lvCommentary=buildRuleCommentary();comm.textContent=lvCommentary+`\n\n(AI 호출 실패: ${e.message} — 규칙 기반으로 대체)`;toast('AI 호출 실패 → 규칙 기반으로 대체')}
}

function printRadar(sc){
  const S=190,c=S/2,R=64,n=AREAS.length;

  const poly=AREAS.map((a,i)=>pt(i,R*(sc[a.k]||0)/100).join(',')).join(' ');
  return `<svg viewBox="0 0 ${S} ${S}" style="width:100%">${rings}<polygon points="${poly}" fill="rgba(217,84,60,.25)" stroke="#D9543C" stroke-width="2"/>${labels}</svg>`;
}

async function loadAttendance(){
  const date=$('#att_date').value||today();
  const box=$('#att_body');
  if(!DB.settings.gasUrl){box.innerHTML='<div class="card pad"><div class="empty">먼저 설정에서 Apps Script URL을 넣어주세요. <span class="link" onclick="go(\'settings\')">설정 열기 →</span></div></div>';return}
  box.innerHTML='<div class="card pad"><div class="empty">출결을 불러오는 중...</div></div>';

  if(!r.ok){box.innerHTML=`<div class="card pad"><div class="empty">불러오기 실패: ${esc(r.error)}</div></div>`;return}

  const stLabel={'정시등원':'정시','지각':'지각','결석':'결석','미입력':'미입력'};

  <div class="grid g-stats" style="margin-bottom:18px">

    <div class="stat gold"><div class="lbl">지각</div><div class="num">${s.지각}<small>명</small></div></div>
    <div class="stat accent"><div class="lbl">결석</div><div class="num">${s.결석}<small>명</small></div><div class="kpi-foot">미입력 ${s.미입력}명</div></div>
  </div>
  <div class="card pad">
    <div class="card-title">출결 명단 — ${r.date}</div>
    <div class="card-sub">결석·지각이 위로 정렬됩니다 · 태도(상/중/하)도 함께 표시</div>
    ${rows.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:14px">
      ${rows.map(x=>`<div style="border:1px solid var(--line);border-left:4px solid ${stColor[x.status]||'var(--muted)'};border-radius:10px;padding:11px 13px;background:${x.status==='결석'||x.status==='지각'?stBg[x.status]:'var(--white)'}">
        <div style="display:flex;justify-content:space-between;align-items:center">

        </div>
        <div style="font-size:11.5px;color:var(--muted);margin-top:4px">${esc(x.sid||'')}${x.attitude?' · 태도 '+esc(x.attitude):''}</div>

function renderBilling(){

    <table><thead><tr><th>학생</th><th>금액</th><th>상태</th><th>청구일</th><th>입금일</th><th>작업</th></tr></thead><tbody id="billBody"></tbody></table>

function monthInvoices(ym){return DB.invoices.filter(i=>i.month===ym)}
function genInvoices(ym){
  const active=DB.students.filter(s=>s.status==='재원');
  let made=0;
  active.forEach(s=>{
    if(DB.invoices.some(i=>i.sid===s.id&&i.month===ym))return;
    DB.invoices.unshift({id:uid(),sid:s.id,name:s.name,month:ym,amount:s.fee||0,status:(s.fee||0)>0?'청구함':'미청구',billedAt:(s.fee||0)>0?today():'',paidAt:'',
      // 결제선생 API 연동 대비 필드 (지금은 비워둠)
      payssamInvoiceId:'',payssamUrl:''});
    made++;
  });
  save();renderBilling();toast(made?`${made}건 청구 생성`:'이미 모두 생성되어 있어요');
}
function drawBilling(ym){
  const list=monthInvoices(ym);
  const paid=list.filter(i=>i.status==='입금완료'),unpaid=list.filter(i=>i.status==='미납'),billed=list.filter(i=>i.status==='청구함');
  const total=list.reduce((s,i)=>s+(i.amount||0),0),paidSum=paid.reduce((s,i)=>s+(i.amount||0),0);
  $('#billTitle').textContent=ym;
  $('#billStats').innerHTML=`
    <div class="stat"><div class="lbl">청구 총액</div><div class="num" style="font-size:24px">${total.toLocaleString()}<small>원</small></div><div class="kpi-foot">${list.length}건</div></div>
    <div class="stat" style="border-top:3px solid var(--ok)"><div class="lbl">입금 완료</div><div class="num" style="font-size:24px">${paidSum.toLocaleString()}<small>원</small></div><div class="kpi-foot">${paid.length}건</div></div>
    <div class="stat accent"><div class="lbl">미납</div><div class="num" style="font-size:24px">${unpaid.length}<small>건</small></div><div class="kpi-foot">독촉 대상</div></div>
    <div class="stat gold"><div class="lbl">청구함(대기)</div><div class="num" style="font-size:24px">${billed.length}<small>건</small></div><div class="kpi-foot">입금 대기 중</div></div>`;
  $('#billBody').innerHTML=list.length?list.map(i=>{
    const sb={'미청구':'rest','청구함':'gold','입금완료':'active','미납':'consult'};
    const next={'미청구':'청구함','청구함':'입금완료','입금완료':'미납','미납':'입금완료'};
    return `<tr>
      <td><b>${esc(i.name)}</b></td>
      <td>${i.amount?i.amount.toLocaleString()+'원':'-'}</td>
      <td><span class="badge ${sb[i.status]==='gold'?'rest':sb[i.status]}" style="${i.status==='청구함'?'background:var(--gold-soft);color:var(--gold)':''}">${esc(i.status)}</span></td>
      <td style="font-size:12px;color:var(--muted)">${i.billedAt||'-'}</td>
      <td style="font-size:12px;color:var(--muted)">${i.paidAt||'-'}</td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm btn-ghost" onclick="cycleInv('${i.id}')">${i.status==='입금완료'?'미납 처리':i.status==='미납'?'입금 처리':i.status==='청구함'?'입금 처리':'청구 처리'}</button>
        <button class="btn btn-sm btn-ghost" onclick="billToKakao('${i.id}')">청구 문안</button>
        <button class="btn btn-sm btn-danger" onclick="delInv('${i.id}')">삭제</button>
      </td></tr>`}).join('')
    :'<tr><td colspan="6" class="empty">이 달 청구 건이 없습니다. 위에서 일괄 청구를 생성하세요.</td></tr>';
}
function cycleInv(id){
  const i=DB.invoices.find(x=>x.id===id);if(!i)return;
  const order={'미청구':'청구함','청구함':'입금완료','입금완료':'미납','미납':'입금완료'};
  i.status=order[i.status];
  if(i.status==='청구함'&&!i.billedAt)i.billedAt=today();
  if(i.status==='입금완료')i.paidAt=today();
  if(i.status==='미납')i.paidAt='';
  save();drawBilling(i.month);toast(`${i.name} → ${i.status}`);
}
function delInv(id){const i=DB.invoices.find(x=>x.id===id);DB.invoices=DB.invoices.filter(x=>x.id!==id);save();drawBilling(i.month);toast('삭제했어요')}
function billToKakao(id){const i=DB.invoices.find(x=>x.id===id);if(!i)return;sessionDraft={sid:i.sid,name:i.name,billing:i};go('kakao')}

function drawRpRadar(){
  const S=250,c=S/2,R=86,n=RP_AREAS.length;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return[c+r*Math.cos(a),c+r*Math.sin(a)]};
  let rings='';[0.25,0.5,0.75,1].forEach(f=>rings+=`<polygon points="${RP_AREAS.map((_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="#E4DCC9"/>`);
  let axes='',labels='';RP_AREAS.forEach((a,i)=>{const[x,y]=pt(i,R);axes+=`<line x1="${c}" y1="${c}" x2="${x}" y2="${y}" stroke="#E4DCC9"/>`;const[lx,ly]=pt(i,R+20);labels+=`<text x="${lx}" y="${ly}" font-size="10.5" font-weight="700" fill="#1E2B47" text-anchor="middle">${a.nm}</text>`});
  const poly=RP_AREAS.map((a,i)=>pt(i,R*rpScores[a.k]/100).join(',')).join(' ');
  $('#rpRadar').innerHTML=`<svg viewBox="0 0 ${S} ${S}" style="width:100%;max-width:290px">${rings}${axes}<polygon points="${poly}" fill="rgba(188,138,48,.2)" stroke="#BC8A30" stroke-width="2.5"/>${RP_AREAS.map((a,i)=>{const[x,y]=pt(i,R*rpScores[a.k]/100);return`<circle cx="${x}" cy="${y}" r="4" fill="#BC8A30"/>`}).join('')}${labels}</svg>`;
}

function buildRuleReport(r){

${r.prog?`진도 면에서는 ${esc(r.prog)} 학습을 이어가고 있습니다. `:''}구문 학습은 배운 문법 지식을 실제 문장에 적용하여 문장 구조를 정확히 파악하고, 영어 어순을 자연스럽게 체화하기 위한 과정입니다. 이를 통해 복잡한 문장도 정확히 해석할 수 있고, 나아가 스스로 올바른 문장을 만들어내는 영작 능력까지 키울 수 있습니다.

${r.note?`특히 ${esc(r.note)} 부분을 함께 살피며 지도하고 있습니다. `:''}다음 달에는 현재의 학습 흐름을 유지하면서 ${r.scores.word<r.scores.hw?'어휘 정착':'독해 정확도'}에 조금 더 무게를 두어 균형 있는 성장을 이끌어가겠습니다.

선생님 참고: ${r.note||'-'}`;

function rpPrintRadar(sc){
  const S=180,c=S/2,R=58,n=RP_AREAS.length;
  const pt=(i,r)=>{const a=-Math.PI/2+i*2*Math.PI/n;return[c+r*Math.cos(a),c+r*Math.sin(a)]};
  let rings='';[0.5,1].forEach(f=>rings+=`<polygon points="${RP_AREAS.map((_,i)=>pt(i,R*f).join(',')).join(' ')}" fill="none" stroke="#E4DCC9"/>`);

  const poly=RP_AREAS.map((a,i)=>pt(i,R*(sc[a.k]||0)/100).join(',')).join(' ');
  return `<svg viewBox="0 0 ${S} ${S}" style="width:100%">${rings}<polygon points="${poly}" fill="rgba(188,138,48,.22)" stroke="#BC8A30" stroke-width="2"/>${labels}</svg>`;
}

function buildRuleKakao(stu,type,tone){
  const r=DB.reports.find(x=>x.sid===stu.id);
  const retest=aggRetestRisk().find(x=>x.sid===stu.id);
  const pend=aggPendingRisk().find(x=>x.sid===stu.id);
  const hi=`안녕하세요, 홍보은영어학원입니다. ${stu.name} 학생 학부모님께 안내드립니다.`;
  const bye=`\n\n궁금하신 점 있으시면 언제든 편하게 연락 주세요. 감사합니다. 🙏`;
  if(type==='billing'){const inv=kkBilling||DB.invoices.find(x=>x.sid===stu.id&&x.month===curMonth());
    const amt=inv?.amount?inv.amount.toLocaleString()+'원':'';const mon=inv?inv.month.replace('-','년 ')+'월':'이번 달';
    const url=DB.settings.payssam?.accountUrl;
    return `${hi}\n\n${mon} 수강료 ${amt} 청구 안내드립니다.${url?`\n아래 결제선생 링크에서 간편하게 결제하실 수 있습니다.\n${url}`:'\n결제선생 청구서를 통해 간편하게 결제하실 수 있습니다.'}\n늘 ${stu.name} 학생의 학습에 함께해 주셔서 감사합니다.${bye}`}
  if(type==='report'){const avg=r?Math.round(RP_AREAS.reduce((s,a)=>s+r.scores[a.k],0)/RP_AREAS.length):null;
    return `${hi}\n\n${r?r.month+' ':''}월간 학습 리포트가 준비되었습니다.${avg!=null?`\n이번 달 종합 성취도는 ${avg}점으로, `:'\n'}${stu.name} 학생은 꾸준히 성장하고 있습니다.${r&&r.prog?`\n진도: ${r.prog}`:''}\n자세한 평가서는 별도로 전달드리겠습니다.${bye}`}
  if(type==='retest')return `${hi}\n\n${stu.name} 학생의 단어 학습 관련 안내입니다.${retest?`\n최근 단어 테스트에서 미통과가 ${retest.total}회 누적되어, 재시를 진행하고 있습니다.`:'\n단어 테스트를 성실히 보고 있습니다.'}\n가정에서도 단어 복습을 함께 챙겨주시면 큰 도움이 됩니다.${bye}`;
  if(type==='pending')return `${hi}\n\n${stu.name} 학생의 과제 수행 관련 안내입니다.${pend?`\n최근 미완료 과제가 ${pend.count}건 누적되어 안내드립니다.`:'\n과제를 성실히 수행하고 있습니다.'}\n가정에서 과제 완료를 한 번 더 확인해 주시면 감사하겠습니다.${bye}`;
  return `${hi}\n\n${stu.name} 학생이 이번 주 수업에서 특히 성실한 태도를 보여주었습니다. 칭찬해 주시면 학습 동기에 큰 힘이 됩니다. 앞으로도 잘 이끌어가겠습니다. 😊${bye}`;
}
async function genKakao(){
  const stu=DB.students.find(s=>s.id===$('#kk_stu').value);if(!stu){toast('학생을 선택하세요');return}
  const type=$('#kk_type').value,tone=$('#kk_tone').value,extra=$('#kk_extra').value.trim();
  const out=$('#kk_out');const key=DB.settings.apiKey;
  if(!key){let t=buildRuleKakao(stu,type,tone);if(extra)t+=`\n\n${extra}`;out.value=t;toast('규칙 기반 문안 생성 (API 키 없음)');return}
  out.value='AI가 알림톡 문안을 작성 중입니다...';
  const r=DB.reports.find(x=>x.sid===stu.id);
  const inv=kkBilling||DB.invoices.find(x=>x.sid===stu.id&&x.month===curMonth());
  let ctx='';
  if(type==='report'&&r)ctx=`월간 성취율 - 출석:${r.scores.attend}, 태도:${r.scores.attitude}, 단어:${r.scores.word}, 과제:${r.scores.hw}, 진도:${r.scores.progress} / 진도:${r.prog||'-'}`;
  if(type==='billing'&&inv)ctx=`청구월:${inv.month}, 금액:${inv.amount?inv.amount.toLocaleString()+'원':'미정'}${DB.settings.payssam?.accountUrl?', 결제링크:'+DB.settings.payssam.accountUrl:''}`;
  const typeKo={report:'월말평가 안내',billing:'수강료 청구 안내',retest:'단어재시 안내',pending:'미완료 과제 안내',praise:'칭찬·격려'}[type];
  const prompt=`너는 '홍보은영어학원' 선생님이다. 학부모에게 보낼 카카오톡 알림 문안을 한국어로 작성하라. ${tone} 말투로, 3~5문장, 이모지는 1~2개만. 학원명으로 시작하고 정중히 마무리.
유형: ${typeKo}
학생: ${stu.name}(${stu.grade})
${ctx}
${extra?`추가 반영: ${extra}`:''}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:DB.settings.model||'claude-sonnet-4-6',max_tokens:600,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    out.value=data.content.filter(c=>c.type==='text').map(c=>c.text).join('\n');toast('AI 문안을 생성했어요');
  }catch(e){let t=buildRuleKakao(stu,type,tone);if(extra)t+=`\n\n${extra}`;out.value=t+`\n\n(AI 호출 실패: ${e.message})`;toast('AI 실패 → 규칙 기반 대체')}
}

/* ============ NOTION 연동 (Apps Script 경유) ============ */
async function fetchNotionStudents(){
  const url=DB.settings.gasUrl;
  if(!url)return{ok:false,error:'설정에 Apps Script URL이 없습니다'};
  try{
    const sep=url.includes('?')?'&':'?';
    const res=await fetch(url+sep+'action=students',{method:'GET',redirect:'follow'});
    const data=await res.json();
    if(!data.ok)return{ok:false,error:data.error||'알 수 없는 오류'};
    return data;
  }catch(e){return{ok:false,error:e.message+' (배포 권한이 "모든 사용자"인지, URL이 /exec로 끝나는지 확인)'}}
}
async function fetchNotionAttendance(date){
  const url=DB.settings.gasUrl;
  if(!url)return{ok:false,error:'설정에 Apps Script URL이 없습니다'};
  try{
    const sep=url.includes('?')?'&':'?';
    const res=await fetch(url+sep+'action=attendance&date='+encodeURIComponent(date),{method:'GET',redirect:'follow'});
    const data=await res.json();
    if(!data.ok)return{ok:false,error:data.error||'알 수 없는 오류'};
    return data;
  }catch(e){return{ok:false,error:e.message}}
}
// Notion 학생 → 로컬 학생으로 병합 (notionId 기준, 없으면 이름 기준)
function importNotionStudents(list){
  let added=0,updated=0;
  list.forEach(n=>{
    const exist=DB.students.find(s=>(n.notionId&&s.notionId===n.notionId)||(s.name===n.name&&s.school===n.school));
    if(exist){Object.assign(exist,{notionId:n.notionId||exist.notionId,school:n.school||exist.school,grade:n.grade||exist.grade,phone:n.phone||exist.phone,pphone:n.pphone||exist.pphone,status:n.status||exist.status,fee:n.fee||exist.fee});updated++;}
    else{DB.students.unshift({id:uid(),notionId:n.notionId,name:n.name,school:n.school,grade:n.grade,phone:n.phone,pphone:n.pphone,status:n.status||'재원',fee:n.fee||0,memo:n.memo||'',created:today()});added++;}
  });
  save();return{added,updated};
}
